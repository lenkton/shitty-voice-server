services:
  app:
    build: .
    environment:
      AMQP_URL: "amqp://rabbitmq:5672"
    ports:
      - 8080:8080
      - 8443:8443
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4.3.1-alpine
    ports:
      - 5672:5672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      start_period: 3s
